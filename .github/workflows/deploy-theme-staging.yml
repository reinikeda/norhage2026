name: Deploy Theme to Staging (matrix)

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  # opt into Node.js 24 for JS actions (silences the Node 20 warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-theme:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - domain: staging.norhage.lt
            user: norhage-staging-lt
          - domain: staging.norhage.de
            user: norhage-staging-de
          - domain: staging.norhage.no
            user: norhage-staging-no
          - domain: staging.norhage.se
            user: norhage-staging-se
          - domain: staging.norhage.fi
            user: norhage-staging
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY_STAGING }}
      # EDIT: repo path to your theme (set already to your theme)
      THEME_DIR: "wp-content/themes/astra-custom-for-norhage"
      RSYNC_DELETE: "false" # set "true" only when you want to mirror and remove remote files
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ env.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Show what will run
        run: |
          echo "Deploying theme from: ${THEME_DIR}"
          echo "Target host: ${SFTP_HOST}"
          echo "Matrix domain: ${{ matrix.domain }}, user: ${{ matrix.user }}"
          echo "RSYNC_DELETE=${RSYNC_DELETE}"

      - name: Ensure remote directory exists
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          REMOTE_DIR="/home/${matrix_user}/htdocs/${{ matrix.domain }}/${THEME_DIR}"
          echo "Ensuring remote dir: ${REMOTE_DIR}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "mkdir -p '${REMOTE_DIR}' && chmod u+rwX '${REMOTE_DIR}' || true"

      - name: Rsync theme to remote
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          RSYNC_OPTS="-az -e \"ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no\" --exclude='.git' --chmod=Du=rwx,Dg=rx,Fu=rw,Fg=r"
          if [ "${RSYNC_DELETE}" = "true" ]; then
            RSYNC_OPTS="${RSYNC_OPTS} --delete"
          fi
          SRC="${THEME_DIR%/}/"
          DEST="${matrix_user}@${SFTP_HOST}:/home/${matrix_user}/htdocs/${{ matrix.domain }}/${THEME_DIR%/}/"
          echo "Running rsync..."
          eval rsync ${RSYNC_OPTS} "${SRC}" "${DEST}"

      - name: Verify deployed files (sample)
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          REMOTE_PATH="/home/${matrix_user}/htdocs/${{ matrix.domain }}/${THEME_DIR%/}/"
          echo "Listing remote path: ${REMOTE_PATH}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "ls -la '${REMOTE_PATH}' | head -n 40" || true