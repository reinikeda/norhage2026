name: Deploy Theme (Staging)

on:
  push:
    branches: [staging]
    # If any of these theme paths change the workflow triggers; prevents unrelated runs
    paths:
      - 'public/wp-content/themes/astra-custom-for-norhage/**'

concurrency:
  group: deploy-theme-staging
  cancel-in-progress: true

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        # reduce to one for initial testing, then add all
        site: ['staging.norhage.lt','staging.norhage.fi','staging.norhage.de','staging.norhage.no','staging.norhage.se']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine site user
        id: setuser
        run: |
          case "${{ matrix.site }}" in
            staging.norhage.lt) echo "SITE_USER=norhage-staging-lt" >> $GITHUB_ENV ;;
            staging.norhage.fi) echo "SITE_USER=norhage-staging" >> $GITHUB_ENV ;;
            staging.norhage.de) echo "SITE_USER=norhage-staging-de" >> $GITHUB_ENV ;;
            staging.norhage.no) echo "SITE_USER=norhage-staging-no" >> $GITHUB_ENV ;;
            staging.norhage.se) echo "SITE_USER=norhage-staging-se" >> $GITHUB_ENV ;;
            *) echo "Unknown site: ${{ matrix.site }}" ; exit 1 ;;
          esac

      - name: Write private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY_STAGING }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: (Optional) Add host key
        if: ${{ secrets.SFTP_KNOWN_HOSTS_STAGING != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KNOWN_HOSTS_STAGING }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote theme directories exist
        run: |
          REMOTE_BASE="/home/${SITE_USER}/htdocs/${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }} "mkdir -p '${REMOTE_BASE}' && chmod u+rwX '${REMOTE_BASE}' || true"

      - name: Upload theme files (assets, languages, inc, template-parts, woocommerce)
        run: |
          REMOTE_BASE="/home/${SITE_USER}/htdocs/${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"
          echo "Uploading languages..."
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/languages/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/languages || true
          echo "Uploading assets..."
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/assets/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/assets || true
          echo "Uploading inc..."
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/inc/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/inc || true
          echo "Uploading template-parts..."
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/template-parts/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/template-parts || true
          echo "Uploading woocommerce..."
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/woocommerce/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/woocommerce || true

      - name: Upload root theme files (functions.php, style.css)
        run: |
          REMOTE_BASE="/home/${SITE_USER}/htdocs/${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/functions.php ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/functions.php || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/themes/astra-custom-for-norhage/style.css ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE_BASE}/style.css || true