name: Deploy Theme and Custom Plugins (Staging)

on:
  push:
    branches: [staging]
    paths:
      # Theme
      - 'public/wp-content/themes/astra-custom-for-norhage/**'
      # Custom plugins
      - 'public/wp-content/plugins/nh-cutting-toggle/**'
      - 'public/wp-content/plugins/nh-delivery-time/**'
      - 'public/wp-content/plugins/nh-faq/**'
      - 'public/wp-content/plugins/nh-feature-box/**'
      - 'public/wp-content/plugins/nh-filters/**'
      - 'public/wp-content/plugins/nh-home-builder/**'
      - 'public/wp-content/plugins/nh-important-notes/**'
      - 'public/wp-content/plugins/nh-inactivity-popup-lite/**'
      - 'public/wp-content/plugins/nh-sale-slider/**'
      - 'public/wp-content/plugins/nh-shipping-calculator/**'
      - 'public/wp-content/plugins/product-labels/**'
      - 'public/wp-content/plugins/running-ticker-line/**'

# Make sure only ONE staging deploy workflow runs at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # =========================
  # THEME (ALL STAGING SITES)
  # =========================
  deploy-theme-staging:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        site:
          - /staging
          - /staging-fi
          - /staging-de
          - /staging-se
          - /staging-no

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy theme to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/*"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"

  # =========================
  # PLUGINS (ALL STAGING SITES)
  # =========================
  deploy-plugins-staging:
    runs-on: ubuntu-latest
    needs: deploy-theme-staging

    strategy:
      # CRITICAL: sequential deployments (one SFTP at a time)
      max-parallel: 1
      matrix:
        include:
          # ---- nh-cutting-toggle
          - site: /staging
            plugin: nh-cutting-toggle
          - site: /staging-fi
            plugin: nh-cutting-toggle
          - site: /staging-de
            plugin: nh-cutting-toggle
          - site: /staging-se
            plugin: nh-cutting-toggle
          - site: /staging-no
            plugin: nh-cutting-toggle

          # ---- nh-delivery-time
          - site: /staging
            plugin: nh-delivery-time
          - site: /staging-fi
            plugin: nh-delivery-time
          - site: /staging-de
            plugin: nh-delivery-time
          - site: /staging-se
            plugin: nh-delivery-time
          - site: /staging-no
            plugin: nh-delivery-time

          # ---- nh-faq
          - site: /staging
            plugin: nh-faq
          - site: /staging-fi
            plugin: nh-faq
          - site: /staging-de
            plugin: nh-faq
          - site: /staging-se
            plugin: nh-faq
          - site: /staging-no
            plugin: nh-faq

          # ---- nh-feature-box
          - site: /staging
            plugin: nh-feature-box
          - site: /staging-fi
            plugin: nh-feature-box
          - site: /staging-de
            plugin: nh-feature-box
          - site: /staging-se
            plugin: nh-feature-box
          - site: /staging-no
            plugin: nh-feature-box

          # ---- nh-filters
          - site: /staging
            plugin: nh-filters
          - site: /staging-fi
            plugin: nh-filters
          - site: /staging-de
            plugin: nh-filters
          - site: /staging-se
            plugin: nh-filters
          - site: /staging-no
            plugin: nh-filters

          # ---- nh-home-builder
          - site: /staging
            plugin: nh-home-builder
          - site: /staging-fi
            plugin: nh-home-builder
          - site: /staging-de
            plugin: nh-home-builder
          - site: /staging-se
            plugin: nh-home-builder
          - site: /staging-no
            plugin: nh-home-builder

          # ---- nh-important-notes
          - site: /staging
            plugin: nh-important-notes
          - site: /staging-fi
            plugin: nh-important-notes
          - site: /staging-de
            plugin: nh-important-notes
          - site: /staging-se
            plugin: nh-important-notes
          - site: /staging-no
            plugin: nh-important-notes

          # ---- nh-inactivity-popup-lite
          - site: /staging
            plugin: nh-inactivity-popup-lite
          - site: /staging-fi
            plugin: nh-inactivity-popup-lite
          - site: /staging-de
            plugin: nh-inactivity-popup-lite
          - site: /staging-se
            plugin: nh-inactivity-popup-lite
          - site: /staging-no
            plugin: nh-inactivity-popup-lite

          # ---- nh-sale-slider
          - site: /staging
            plugin: nh-sale-slider
          - site: /staging-fi
            plugin: nh-sale-slider
          - site: /staging-de
            plugin: nh-sale-slider
          - site: /staging-se
            plugin: nh-sale-slider
          - site: /staging-no
            plugin: nh-sale-slider

          # ---- nh-shipping-calculator
          - site: /staging
            plugin: nh-shipping-calculator
          - site: /staging-fi
            plugin: nh-shipping-calculator
          - site: /staging-de
            plugin: nh-shipping-calculator
          - site: /staging-se
            plugin: nh-shipping-calculator
          - site: /staging-no
            plugin: nh-shipping-calculator

          # ---- product-labels
          - site: /staging
            plugin: product-labels
          - site: /staging-fi
            plugin: product-labels
          - site: /staging-de
            plugin: product-labels
          - site: /staging-se
            plugin: product-labels
          - site: /staging-no
            plugin: product-labels

          # ---- running-ticker-line
          - site: /staging
            plugin: running-ticker-line
          - site: /staging-fi
            plugin: running-ticker-line
          - site: /staging-de
            plugin: running-ticker-line
          - site: /staging-se
            plugin: running-ticker-line
          - site: /staging-no
            plugin: running-ticker-line

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy plugin ${{ matrix.plugin }} to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/plugins/${{ matrix.plugin }}/*"
          remote_path: "${{ matrix.site }}/wp-content/plugins/${{ matrix.plugin }}"
          