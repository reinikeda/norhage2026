name: Deploy Theme to Staging (LT only)

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-theme:
    runs-on: ubuntu-latest
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY_STAGING }}
      SITE_USER: norhage-staging-lt
      SITE_DOMAIN: staging.norhage.lt
      THEME_DIR: "wp-content/themes/astra-custom-for-norhage"
      RSYNC_DELETE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ env.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Show config
        run: |
          echo "Theme: ${THEME_DIR}"
          echo "Target: ${SITE_USER}@${SFTP_HOST}:${SITE_DOMAIN}"
          echo "RSYNC_DELETE=${RSYNC_DELETE}"

      - name: Ensure remote directory exists
        run: |
          REMOTE_DIR="/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/${THEME_DIR}"
          echo "Ensuring remote dir: ${REMOTE_DIR}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${SFTP_HOST} "mkdir -p '${REMOTE_DIR}' && chmod u+rwX '${REMOTE_DIR}' || true"

      - name: Rsync theme to remote
        run: |
          RSYNC_OPTS="-az -e \"ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no\" --exclude='.git' --chmod=Du=rwx,Dg=rx,Fu=rw,Fg=r"
          if [ "${RSYNC_DELETE}" = "true" ]; then RSYNC_OPTS="${RSYNC_OPTS} --delete"; fi
          SRC="${THEME_DIR%/}/"
          DEST="${SITE_USER}@${SFTP_HOST}:/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/${THEME_DIR%/}/"
          echo "Running rsync..."
          eval rsync ${RSYNC_OPTS} "${SRC}" "${DEST}"

      - name: Verify deployed files (sample)
        run: |
          REMOTE_PATH="/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/${THEME_DIR%/}/"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${SFTP_HOST} "ls -la '${REMOTE_PATH}' | head -n 40" || true
