name: Deploy Theme Parts and Custom Plugins (Production)

on:
  push:
    branches: [main]
    paths:
      - 'public/wp-content/themes/astra-custom-for-norhage/**'
      - 'public/wp-content/plugins/nh-cutting-toggle/**'
      - 'public/wp-content/plugins/nh-delivery-time/**'
      - 'public/wp-content/plugins/nh-faq/**'
      - 'public/wp-content/plugins/nh-feature-box/**'
      - 'public/wp-content/plugins/nh-filters/**'
      - 'public/wp-content/plugins/nh-home-builder/**'
      - 'public/wp-content/plugins/nh-important-notes/**'
      - 'public/wp-content/plugins/nh-inactivity-popup-lite/**'
      - 'public/wp-content/plugins/nh-sale-slider/**'
      - 'public/wp-content/plugins/nh-shipping-calculator/**'
      - 'public/wp-content/plugins/product-labels/**'
      - 'public/wp-content/plugins/running-ticker-line/**'

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      theme_languages: ${{ steps.filter.outputs.theme_languages }}
      theme_assets: ${{ steps.filter.outputs.theme_assets }}
      theme_inc: ${{ steps.filter.outputs.theme_inc }}
      theme_template_parts: ${{ steps.filter.outputs.theme_template_parts }}
      theme_woocommerce: ${{ steps.filter.outputs.theme_woocommerce }}
      theme_functions: ${{ steps.filter.outputs.theme_functions }}
      theme_style: ${{ steps.filter.outputs.theme_style }}
      plugins_json: ${{ steps.setmatrix.outputs.plugins_json }}
      plugins_changed: ${{ steps.setmatrix.outputs.plugins_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          list-files: shell
          filters: |
            theme_languages:
              - 'public/wp-content/themes/astra-custom-for-norhage/languages/**'

            theme_assets:
              - 'public/wp-content/themes/astra-custom-for-norhage/assets/**'

            theme_inc:
              - 'public/wp-content/themes/astra-custom-for-norhage/inc/**'

            theme_template_parts:
              - 'public/wp-content/themes/astra-custom-for-norhage/template-parts/**'

            theme_woocommerce:
              - 'public/wp-content/themes/astra-custom-for-norhage/woocommerce/**'

            theme_functions:
              - 'public/wp-content/themes/astra-custom-for-norhage/functions.php'

            theme_style:
              - 'public/wp-content/themes/astra-custom-for-norhage/style.css'

            nh-cutting-toggle:
              - 'public/wp-content/plugins/nh-cutting-toggle/**'

            nh-delivery-time:
              - 'public/wp-content/plugins/nh-delivery-time/**'

            nh-faq:
              - 'public/wp-content/plugins/nh-faq/**'

            nh-feature-box:
              - 'public/wp-content/plugins/nh-feature-box/**'

            nh-filters:
              - 'public/wp-content/plugins/nh-filters/**'

            nh-home-builder:
              - 'public/wp-content/plugins/nh-home-builder/**'

            nh-important-notes:
              - 'public/wp-content/plugins/nh-important-notes/**'

            nh-inactivity-popup-lite:
              - 'public/wp-content/plugins/nh-inactivity-popup-lite/**'

            nh-sale-slider:
              - 'public/wp-content/plugins/nh-sale-slider/**'

            nh-shipping-calculator:
              - 'public/wp-content/plugins/nh-shipping-calculator/**'

            product-labels:
              - 'public/wp-content/plugins/product-labels/**'

            running-ticker-line:
              - 'public/wp-content/plugins/running-ticker-line/**'

      - name: Build plugins matrix JSON (only changed)
        id: setmatrix
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os

          plugin_keys = [
            "nh-cutting-toggle",
            "nh-delivery-time",
            "nh-faq",
            "nh-feature-box",
            "nh-filters",
            "nh-home-builder",
            "nh-important-notes",
            "nh-inactivity-popup-lite",
            "nh-sale-slider",
            "nh-shipping-calculator",
            "product-labels",
            "running-ticker-line",
          ]

          changed = []
          for k in plugin_keys:
            v = os.environ.get(k, "")
            if v.lower() == "true":
              changed.append(k)

          plugins_changed = "true" if changed else "false"
          plugins_json = json.dumps(changed)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"plugins_changed={plugins_changed}\n")
            f.write(f"plugins_json={plugins_json}\n")
          PY
        env:
          nh-cutting-toggle: ${{ steps.filter.outputs['nh-cutting-toggle'] }}
          nh-delivery-time: ${{ steps.filter.outputs['nh-delivery-time'] }}
          nh-faq: ${{ steps.filter.outputs['nh-faq'] }}
          nh-feature-box: ${{ steps.filter.outputs['nh-feature-box'] }}
          nh-filters: ${{ steps.filter.outputs['nh-filters'] }}
          nh-home-builder: ${{ steps.filter.outputs['nh-home-builder'] }}
          nh-important-notes: ${{ steps.filter.outputs['nh-important-notes'] }}
          nh-inactivity-popup-lite: ${{ steps.filter.outputs['nh-inactivity-popup-lite'] }}
          nh-sale-slider: ${{ steps.filter.outputs['nh-sale-slider'] }}
          nh-shipping-calculator: ${{ steps.filter.outputs['nh-shipping-calculator'] }}
          product-labels: ${{ steps.filter.outputs['product-labels'] }}
          running-ticker-line: ${{ steps.filter.outputs['running-ticker-line'] }}

  deploy-theme-languages:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_languages == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme languages to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/languages/**"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage/languages"

  deploy-theme-assets:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_assets == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme assets to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/assets/**"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage/assets"

  deploy-theme-inc:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_inc == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme inc to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/inc/**"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage/inc"

  deploy-theme-template-parts:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_template_parts == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme template-parts to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/template-parts/**"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage/template-parts"

  deploy-theme-woocommerce:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_woocommerce == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme woocommerce to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/woocommerce/**"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage/woocommerce"

  deploy-theme-functions:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_functions == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme functions.php to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/functions.php"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"

  deploy-theme-style:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.theme_style == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy theme style.css to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/themes/astra-custom-for-norhage/style.css"
          remote_path: "${{ matrix.site }}/wp-content/themes/astra-custom-for-norhage"

  deploy-plugins-production:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.plugins_changed == 'true'
    strategy:
      max-parallel: 1
      matrix:
        site: [/www, /www-fi, /www-no, /www-se, /www-de]
        plugin: ${{ fromJSON(needs.detect-changes.outputs.plugins_json) }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy plugin ${{ matrix.plugin }} to ${{ matrix.site }} via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          sftp_only: true
          local_path: "public/wp-content/plugins/${{ matrix.plugin }}/**"
          remote_path: "${{ matrix.site }}/wp-content/plugins/${{ matrix.plugin }}"