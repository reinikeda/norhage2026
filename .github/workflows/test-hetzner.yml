name: Test Hetzner Connection

on:
  workflow_dispatch: # This allows you to run it manually from the "Actions" tab

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Create a test file
        run: echo "Hetzner Test $(date)" > hetzner-test.txt

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY_STAGING }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Test Upload to staging.norhage.lt
        run: |
          # We use the IP from your secret and the user from your screenshot
          # The path matches your Domain Settings screenshot
          SCP_DEST="norhage-staging-lt@${{ secrets.SFTP_HOST_STAGING }}:/home/norhage-staging-lt/htdocs/staging.norhage.lt/wp-content/hetzner-test.txt"
          
          echo "Attempting to upload to: $SCP_DEST"
          
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no hetzner-test.txt "$SCP_DEST"

      - name: Verify file on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no norhage-staging-lt@${{ secrets.SFTP_HOST_STAGING }} "ls -la /home/norhage-staging-lt/htdocs/staging.norhage.lt/wp-content/hetzner-test.txt"