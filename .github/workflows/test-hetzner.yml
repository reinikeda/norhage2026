name: Test Production Connection (matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-prod-connection:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - domain: norhage.de
            user: norhage-de
          - domain: norhage.fi
            user: norhage-fi
          - domain: norhage.lt
            user: norhage-lt
          - domain: norhage.no
            user: norhage-no
          - domain: norhage.se
            user: norhage-se

    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST_PROD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY_PROD }}
      SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS_PROD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${SFTP_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Setup known_hosts and SSH options
        run: |
          if [ -n "${SFTP_KNOWN_HOSTS}" ]; then
            mkdir -p ~/.ssh
            printf "%s\n" "${SFTP_KNOWN_HOSTS}" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
            echo "Known hosts written"
            SSH_OPTS="-o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"
          else
            echo "SFTP_KNOWN_HOSTS not set; using StrictHostKeyChecking=no"
            SSH_OPTS="-o StrictHostKeyChecking=no"
          fi
          # export ssh option string for later steps
          echo "SSH_CMD_OPTS=${SSH_OPTS}" >> $GITHUB_ENV

      - name: Create local test file
        run: |
          echo "production test $GITHUB_RUN_ID $(date -u)" > prod-test.txt
          cat prod-test.txt

      - name: Ensure remote dir & upload test file
        env:
          matrix_user: ${{ matrix.user }}
          matrix_domain: ${{ matrix.domain }}
        run: |
          # prepare ssh/scp commands using SSH_CMD_OPTS provided earlier
          ssh_cmd="ssh $SSH_CMD_OPTS -i ~/.ssh/deploy_key"
          scp_cmd="scp $SSH_CMD_OPTS -i ~/.ssh/deploy_key"

          REMOTE_DIR="/home/${matrix_user}/htdocs/${matrix_domain}"
          REMOTE_PATH="${REMOTE_DIR}/prod-test.txt"

          echo "Ensuring remote dir: ${REMOTE_DIR}"
          eval "${ssh_cmd} ${matrix_user}@${SFTP_HOST} \"mkdir -p '${REMOTE_DIR}' || true\""

          echo "Uploading prod-test.txt to ${REMOTE_PATH}"
          eval "${scp_cmd} prod-test.txt ${matrix_user}@${SFTP_HOST}:'${REMOTE_PATH}'"

      - name: Verify remote file
        env:
          matrix_user: ${{ matrix.user }}
          matrix_domain: ${{ matrix.domain }}
        run: |
          ssh_cmd="ssh $SSH_CMD_OPTS -i ~/.ssh/deploy_key"
          REMOTE_PATH="/home/${matrix_user}/htdocs/${matrix_domain}/prod-test.txt"
          echo "Listing and showing ${REMOTE_PATH}"
          eval "${ssh_cmd} ${matrix_user}@${SFTP_HOST} \"ls -la '${REMOTE_PATH}' || true && sed -n '1,200p' '${REMOTE_PATH}' || true\""
