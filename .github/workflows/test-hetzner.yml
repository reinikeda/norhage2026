name: Test Hetzner Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    env:
      SITE_DOMAIN: staging.norhage.lt    # change if needed
      SITE_USER: norhage-staging-lt      # change to GitHub-Actions-Staging if you will use that user
      SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create test file
        run: |
          echo "Hetzner Test from GitHub Actions - run $GITHUB_RUN_ID - $(date)" > hetzner-test.txt
          ls -l hetzner-test.txt

      - name: Write private key to file
        run: |
          mkdir -p ~/.ssh
          # Use printf so newlines are preserved
          printf "%s\n" "${{ secrets.SFTP_PRIVATE_KEY_STAGING }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Ensure remote directory exists
        run: |
          REMOTE_DIR="/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/wp-content"
          echo "Ensuring remote dir: ${REMOTE_DIR}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${SFTP_HOST} "mkdir -p '${REMOTE_DIR}' && chmod u+rwX '${REMOTE_DIR}' || true"
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}

      - name: Upload test file
        run: |
          REMOTE_DIR="/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/wp-content"
          echo "Uploading hetzner-test.txt to ${REMOTE_DIR}/hetzner-test.txt"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no hetzner-test.txt ${SITE_USER}@${SFTP_HOST}:"${REMOTE_DIR}/hetzner-test.txt"
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}

      - name: Verify remote file exists
        run: |
          REMOTE_PATH="/home/${SITE_USER}/htdocs/${SITE_DOMAIN}/wp-content/hetzner-test.txt"
          echo "Checking remote path: ${REMOTE_PATH}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${SFTP_HOST} "ls -la '${REMOTE_PATH}' || echo 'file missing'"
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
