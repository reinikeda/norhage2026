name: Test Hetzner Connection

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    env:
      # Change SITE_USER to the exact user you added the public key to (or to "root" if you installed the key into /root/.ssh/authorized_keys)
      SITE_USER: norhage-staging-lt
      SITE_DOMAIN: staging.norhage.lt
      SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show secret presence (masked)
        run: |
          echo "SFTP_HOST set?   : ${SFTP_HOST:+yes}"
          echo "PRIVATE_KEY set? : ${SFTP_PRIVATE_KEY_STAGING:+yes}"
        env:
          SFTP_PRIVATE_KEY_STAGING: ${{ secrets.SFTP_PRIVATE_KEY_STAGING }}

      - name: Write private key to file
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SFTP_PRIVATE_KEY_STAGING }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: SSH verbose test (shows auth/connection handshake)
        run: |
          set -x
          ssh -vvv -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${SFTP_HOST} \
            "echo 'CONNECTED:'; whoami; id; pwd; ls -la ~ || true"
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}

      - name: Upload a small test file and verify
        run: |
          echo "GitHub Actions Hetzner test - $GITHUB_RUN_ID - $(date)" > hetzner-test.txt
          scp -vvv -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no hetzner-test.txt ${SITE_USER}@${SFTP_HOST}:/tmp/hetzner-test.txt
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SITE_USER}@${SFTP_HOST} "ls -la /tmp/hetzner-test.txt || echo 'file missing'"
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
