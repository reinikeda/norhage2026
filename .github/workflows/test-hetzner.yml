name: Test Hetzner Connection (matrix)

on:
  workflow_dispatch:
  push:
    branches:
      - staging

env:
  # Opt into Node.js 24 for JS actions to silence the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  matrix-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - domain: staging.norhage.lt
            user: norhage-staging-lt
          - domain: staging.norhage.de
            user: norhage-staging-de
          - domain: staging.norhage.no
            user: norhage-staging-no
          - domain: staging.norhage.se
            user: norhage-staging-se
          - domain: staging.norhage.fi
            user: norhage-staging
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST_STAGING }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show secret presence (masked)
        run: |
          echo "SFTP_HOST set?   : ${SFTP_HOST:+yes}"
          echo "PRIVATE_KEY set? : ${SFTP_PRIVATE_KEY:+yes}"

      - name: Write private key to file
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${SFTP_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Prepare test file
        run: |
          echo "Hetzner test for ${GITHUB_RUN_ID} ${{ matrix.domain }} - $(date)" > hetzner-${{ matrix.domain }}.txt
          ls -l hetzner-${{ matrix.domain }}.txt

      - name: Ensure remote dir exists
        run: |
          REMOTE_DIR="/home/${{ matrix.user }}/htdocs/${{ matrix.domain }}/wp-content"
          echo "Ensuring remote dir: ${REMOTE_DIR}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "mkdir -p '${REMOTE_DIR}' && chmod u+rwX '${REMOTE_DIR}' || true"
        env:
          matrix_user: ${{ matrix.user }}

      - name: Upload test file
        run: |
          REMOTE_DIR="/home/${{ matrix.user }}/htdocs/${{ matrix.domain }}/wp-content"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key hetzner-${{ matrix.domain }}.txt ${matrix_user}@${SFTP_HOST}:"${REMOTE_DIR}/hetzner-${{ matrix.domain }}.txt"
        env:
          matrix_user: ${{ matrix.user }}

      - name: Verify remote file exists
        run: |
          REMOTE_PATH="/home/${{ matrix.user }}/htdocs/${{ matrix.domain }}/wp-content/hetzner-${{ matrix.domain }}.txt"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "ls -la '${REMOTE_PATH}' || echo 'file missing'"
        env:
          matrix_user: ${{ matrix.user }}
