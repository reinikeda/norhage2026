name: Deploy Plugins (Staging)

on:
  push:
    branches: [staging]
    paths:
      - 'public/wp-content/plugins/**'

concurrency:
  group: deploy-plugins-staging
  cancel-in-progress: true

jobs:
  detect-changed-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins_json: ${{ steps.setmatrix.outputs.plugins_json }}
      plugins_changed: ${{ steps.setmatrix.outputs.plugins_changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed plugin folders
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          list-files: true
          filters: |
            nh-cutting-toggle: ['public/wp-content/plugins/nh-cutting-toggle/**']
            nh-delivery-time: ['public/wp-content/plugins/nh-delivery-time/**']
            nh-faq: ['public/wp-content/plugins/nh-faq/**']
            nh-feature-box: ['public/wp-content/plugins/nh-feature-box/**']
            nh-filters: ['public/wp-content/plugins/nh-filters/**']
            nh-home-builder: ['public/wp-content/plugins/nh-home-builder/**']
            nh-important-notes: ['public/wp-content/plugins/nh-important-notes/**']
            nh-inactivity-popup-lite: ['public/wp-content/plugins/nh-inactivity-popup-lite/**']
            nh-sale-slider: ['public/wp-content/plugins/nh-sale-slider/**']
            nh-shipping-calculator: ['public/wp-content/plugins/nh-shipping-calculator/**']
            product-labels: ['public/wp-content/plugins/product-labels/**']
            running-ticker-line: ['public/wp-content/plugins/running-ticker-line/**']

      - name: Build plugins matrix JSON
        id: setmatrix
        shell: bash
        run: |
          python3 - <<'PY'
          import os, json
          keys = [
            "nh-cutting-toggle","nh-delivery-time","nh-faq","nh-feature-box",
            "nh-filters","nh-home-builder","nh-important-notes",
            "nh-inactivity-popup-lite","nh-sale-slider","nh-shipping-calculator",
            "product-labels","running-ticker-line"
          ]
          changed=[]
          for k in keys:
            if os.environ.get(k,"").lower()=="true":
              changed.append(k)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"plugins_changed={'true' if changed else 'false'}\n")
            f.write(f"plugins_json={json.dumps(changed)}\n")
          PY
        env:
          nh-cutting-toggle: ${{ steps.filter.outputs['nh-cutting-toggle'] }}
          nh-delivery-time: ${{ steps.filter.outputs['nh-delivery-time'] }}
          nh-faq: ${{ steps.filter.outputs['nh-faq'] }}
          nh-feature-box: ${{ steps.filter.outputs['nh-feature-box'] }}
          nh-filters: ${{ steps.filter.outputs['nh-filters'] }}
          nh-home-builder: ${{ steps.filter.outputs['nh-home-builder'] }}
          nh-important-notes: ${{ steps.filter.outputs['nh-important-notes'] }}
          nh-inactivity-popup-lite: ${{ steps.filter.outputs['nh-inactivity-popup-lite'] }}
          nh-sale-slider: ${{ steps.filter.outputs['nh-sale-slider'] }}
          nh-shipping-calculator: ${{ steps.filter.outputs['nh-shipping-calculator'] }}
          product-labels: ${{ steps.filter.outputs['product-labels'] }}
          running-ticker-line: ${{ steps.filter.outputs['running-ticker-line'] }}

  deploy-changed-plugins:
    runs-on: ubuntu-latest
    needs: detect-changed-plugins
    if: needs.detect-changed-plugins.outputs.plugins_changed == 'true'
    strategy:
      matrix:
        site: ['staging.norhage.lt','staging.norhage.fi','staging.norhage.de','staging.norhage.no','staging.norhage.se']
        plugin: ${{ fromJSON(needs.detect-changed-plugins.outputs.plugins_json) }}
      max-parallel: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ env.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Ensure plugin dir exists on remote
        run: |
          REMOTE="/home/${SITE_USER}/htdocs/${{ matrix.site }}/wp-content/plugins/${{ matrix.plugin }}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }} "mkdir -p '${REMOTE}' && chmod u+rwX '${REMOTE}' || true"

      - name: Upload plugin ${ { matrix.plugin } }
        run: |
          REMOTE="/home/${SITE_USER}/htdocs/${{ matrix.site }}/wp-content/plugins/${{ matrix.plugin }}"
          scp -r -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no public/wp-content/plugins/${{ matrix.plugin }}/* ${SITE_USER}@${{ secrets.SFTP_HOST_STAGING }}:${REMOTE}