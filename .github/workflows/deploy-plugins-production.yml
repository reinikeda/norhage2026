name: Deploy Plugins to Production (matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-plugins:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - domain: norhage.de
            user: norhage-de
          - domain: norhage.fi
            user: norhage-fi
          - domain: norhage.lt
            user: norhage-lt
          - domain: norhage.no
            user: norhage-no
          - domain: norhage.se
            user: norhage-se
          - domain: norhage.eu
            user: norhage-eu
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST_PROD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY_PROD }}
      SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS_PROD }}
      PLUGIN_DIR: "public/wp-content/plugins"
      RSYNC_DELETE: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ env.SFTP_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

      - name: Setup known_hosts and SSH options
        run: |
          if [ -n "${SFTP_KNOWN_HOSTS}" ]; then
            mkdir -p ~/.ssh
            printf "%s\n" "${SFTP_KNOWN_HOSTS}" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
            echo "SSH_CMD_OPTS=-o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes" >> $GITHUB_ENV
            echo "Known hosts written"
          else
            echo "SSH_CMD_OPTS=-o StrictHostKeyChecking=no" >> $GITHUB_ENV
            echo "SFTP_KNOWN_HOSTS not set; using StrictHostKeyChecking=no"
          fi

      - name: Show config
        run: |
          echo "Plugin path in repo: ${PLUGIN_DIR}"
          echo "Target host: ${SFTP_HOST}"
          echo "Matrix domain: ${{ matrix.domain }}, user: ${{ matrix.user }}"
          echo "RSYNC_DELETE=${RSYNC_DELETE}"
          echo "SSH options: $SSH_CMD_OPTS"

      - name: Ensure remote plugin directory exists
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          REMOTE_SUBPATH="${PLUGIN_DIR#public/}"
          REMOTE_DIR="/home/${matrix_user}/htdocs/${{ matrix.domain }}/${REMOTE_SUBPATH%/}"
          echo "Ensuring remote dir: ${REMOTE_DIR}"
          ssh $SSH_CMD_OPTS -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "mkdir -p '${REMOTE_DIR}' && chmod u+rwX '${REMOTE_DIR}' || true"

      - name: Rsync plugins to remote
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key $SSH_CMD_OPTS"
          RSYNC_OPTS="-az -e \"$RSYNC_SSH\" --exclude='.git' --chmod=Du=rwx,Dg=rx,Fu=rw,Fg=r"
          if [ "${RSYNC_DELETE}" = "true" ]; then
            RSYNC_OPTS="${RSYNC_OPTS} --delete"
          fi

          SRC="${PLUGIN_DIR%/}/"
          REMOTE_SUBPATH="${PLUGIN_DIR#public/}"
          DEST="${matrix_user}@${SFTP_HOST}:/home/${matrix_user}/htdocs/${{ matrix.domain }}/${REMOTE_SUBPATH%/}/"
          echo "Running: rsync ${RSYNC_OPTS} ${SRC} ${DEST}"
          eval rsync ${RSYNC_OPTS} "${SRC}" "${DEST}"

      - name: Verify deployed plugin files (sample)
        env:
          matrix_user: ${{ matrix.user }}
        run: |
          REMOTE_SUBPATH="${PLUGIN_DIR#public/}"
          REMOTE_PATH="/home/${matrix_user}/htdocs/${{ matrix.domain }}/${REMOTE_SUBPATH%/}/"
          echo "Listing remote path: ${REMOTE_PATH}"
          ssh $SSH_CMD_OPTS -i ~/.ssh/deploy_key ${matrix_user}@${SFTP_HOST} "ls -la '${REMOTE_PATH}' | head -n 60" || true